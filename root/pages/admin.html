<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ariana's Art Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/admin.css">
    <noscript><style>html{visibility:visible!important}</style></noscript>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="admin-header">
        <a href="images.html" class="admin-btn admin-btn-images" id="images-btn">Manage Images</a>
        <h1 class="page-title">Admin Dashboard</h1>
        <button id="logout-btn" class="admin-btn admin-btn-logout">Log Out</button>
    </div>
    <hr class="page-divider">

    <div id="admin-content" class="admin-container"></div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
        <a href="login.html" class="footer-admin active">Admin</a>
        <p class="footer-copy">&copy; 2025 Ariana's Art Site. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        (async () => {
            "use strict";

            // Quick redirect if sessionStorage says not logged in
            if (!Auth.isLoggedIn()) {
                window.location.href = "login.html";
                return;
            }

            // Verify session with the server before showing anything
            const valid = await Auth.checkSession();
            if (!valid) {
                window.location.href = "login.html";
                return;
            }

            // Auth confirmed — reveal the page
            document.documentElement.classList.add('ready');

            // Render the editable dashboard (async — fetches from API)
            Admin.renderDashboard();

            // Logout (async — calls server)
            document.getElementById("logout-btn").addEventListener("click", async () => {
                await Auth.logout();
                window.location.href = "login.html";
            });
        })();
    </script>
</body>
</html>
