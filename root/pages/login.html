<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ariana's Art Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/login.css">
    <script>document.documentElement.classList.add('ready');</script>
    <noscript><style>html{visibility:visible!important}</style></noscript>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="login-container">
        <h1 class="login-title">Admin Login</h1>
        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" maxlength="50"
                       required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" maxlength="128"
                       required autocomplete="off">
            </div>
            <div id="login-error" class="login-error" role="alert"></div>
            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
        </div>
        <a href="login.html" class="footer-admin active">Admin</a>
        <p class="footer-copy">&copy; 2025 Ariana's Art Site. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        (() => {
            "use strict";

            // If already logged in, redirect to admin panel
            if (Auth.isLoggedIn()) {
                window.location.href = "admin.html";
                return;
            }

            const form    = document.getElementById("login-form");
            const errorEl = document.getElementById("login-error");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errorEl.textContent = "";

                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value;

                if (!username || !password) {
                    errorEl.textContent = "Please fill in both fields.";
                    return;
                }

                // Auth.login() now calls the server API
                const result = await Auth.login(username, password);
                if (result.success) {
                    window.location.href = "admin.html";
                } else {
                    errorEl.textContent = result.message;
                }
            });
        })();
    </script>
</body>
</html>
