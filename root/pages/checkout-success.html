<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Ariana's Art Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/index.css">
    <link rel="stylesheet" href="../style/shop.css">
    <link rel="stylesheet" href="../style/cart.css">
    <script>document.documentElement.classList.add('ready');</script>
    <noscript><style>html{visibility:visible!important}</style></noscript>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div style="text-align: center; padding: 4rem 2rem;">
        <h1 class="page-title">Thank You for Your Purchase!</h1>
        <hr class="page-divider">
        <p style="font-size: 1.1rem; margin: 2rem auto; max-width: 500px; color: rgba(232, 224, 216, 0.65); font-weight: 300;">
            Your order has been confirmed. We'll be in touch soon with details
            about your artwork.
        </p>
        <a href="shop.html" class="shop-link">
            &larr; Continue Shopping
        </a>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
        </div>
        <a href="login.html" class="footer-admin">Admin</a>
        <p class="footer-copy">&copy; 2025 Ariana's Art Site. All rights reserved.</p>
    </footer>

    <script>
        // Clear the cart after successful purchase
        localStorage.removeItem("artsite_cart");

        // Confirm the purchase and decrement quantity server-side
        (() => {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get("session_id");
            if (sessionId) {
                fetch(`/api/checkout/confirm?session_id=${encodeURIComponent(sessionId)}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.confirmed) {
                            console.warn("Order not yet confirmed:", data.reason);
                        }
                    })
                    .catch(err => console.error("Confirm error:", err));
            }
        })();
    </script>
</body>
</html>
