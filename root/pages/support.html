<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Ariana's Art Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/support.css">
    <link rel="stylesheet" href="../style/cart.css">
    <script>document.documentElement.classList.add('ready');</script>
    <noscript><style>html{visibility:visible!important}</style></noscript>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <h1 class="page-title">Support</h1>
    <hr class="page-divider">

    <section class="support-form-section">
        <form id="support-form" class="support-form">
            <label for="support-email">Your Email</label>
            <input type="email" id="support-email" name="email" required placeholder="you@example.com">

            <label for="support-message">Message</label>
            <textarea id="support-message" name="message" required placeholder="How can we help you?" rows="8"></textarea>

            <button type="submit" class="support-send-btn">Send</button>
        </form>
    </section>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
        </div>
        <a href="login.html" class="footer-admin">Admin</a>
        <p class="footer-copy">&copy; 2025 Ariana's Art Site. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById("support-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("support-email").value.trim();
            const message = document.getElementById("support-message").value.trim();
            if (!email || !message) return;

            const btn = e.target.querySelector(".support-send-btn");
            btn.disabled = true;
            btn.textContent = "Sending…";

            try {
                const res = await fetch("/api/support", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, message })
                });
                if (res.ok) {
                    window.location.href = "support-success.html";
                } else {
                    const data = await res.json();
                    alert(data.error || "Something went wrong. Please try again.");
                    btn.disabled = false;
                    btn.textContent = "Send";
                }
            } catch {
                alert("Network error. Please try again.");
                btn.disabled = false;
                btn.textContent = "Send";
            }
        });
    </script>
</body>
</html>
