<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Manager - Ariana's Art Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/admin.css">
    <link rel="stylesheet" href="../style/images.css">
    <noscript><style>html{visibility:visible!important}</style></noscript>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="admin-header">
        <h1 class="page-title">Image Manager</h1>
        <a href="admin.html" class="admin-btn admin-btn-back" id="back-btn">&larr; Back to Dashboard</a>
    </div>
    <hr class="page-divider">

    <div class="admin-container images-container">
        <div id="images-list">
            <p class="images-loading">Loading images&hellip;</p>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="preview-modal hidden">
        <div class="preview-overlay"></div>
        <div class="preview-content">
            <button id="preview-close" class="preview-close">&times;</button>
            <img id="preview-img" src="" alt="Preview">
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="delete-modal hidden">
        <div class="delete-overlay"></div>
        <div class="delete-dialog">
            <p>Are you sure you want to delete this file?</p>
            <div class="delete-dialog-actions">
                <button id="delete-yes" class="admin-btn admin-btn-delete">Yes, Delete</button>
                <button id="delete-no" class="admin-btn admin-btn-cancel">No, Cancel</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
        </div>
        <a href="login.html" class="footer-admin">Admin</a>
        <p class="footer-copy">&copy; 2025 Ariana's Art Site. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/images.js"></script>
    <script>
        (async () => {
            "use strict";

            // Quick redirect if sessionStorage says not logged in
            if (!Auth.isLoggedIn()) {
                window.location.href = "login.html";
                return;
            }

            // Verify session with the server before showing anything
            const valid = await Auth.checkSession();
            if (!valid) {
                window.location.href = "login.html";
                return;
            }

            // Auth confirmed — reveal the page
            document.documentElement.classList.add('ready');

            ImageManager.init();
        })();
    </script>
</body>
</html>
